# Sash — XcodeGen project definition.
# このファイルが唯一の真実（single source of truth）。生成される .xcodeproj は gitignore する。
# 生成: `xcodegen generate` → Xcode で開いて Signing チームを選択 → ⌘R。
name: Sash

options:
  developmentLanguage: en          # 開発基準言語は英語。ユーザー向け文字列は String Catalog 管理。
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

packages:
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"           # 同梱コードは Swift 5。Swift 6 の厳格並行性は段階導入とする。
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic      # 署名チームは Xcode 側で各自選択（人間ゲート）。
    SWIFT_EMIT_LOC_STRINGS: "YES"   # Text()/String(localized:) を String Catalog へ抽出。

targets:
  Sash:
    type: application
    platform: macOS
    sources:
      - path: Sash
    dependencies:
      - package: KeyboardShortcuts
    info:
      path: Sash/Info.plist          # XcodeGen が生成（gitignore 済み）。
      properties:
        LSUIElement: true            # メニューバー常駐・Dock アイコンなし。
        LSApplicationCategoryType: public.app-category.productivity
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.gyugyu86.Sash
        PRODUCT_NAME: Sash
        ENABLE_TESTABILITY: "YES"    # @testable import Sash を可能にする。
        # CGWindowID 取得用の非公開API宣言（_AXUIElementGetWindow）を Swift から使うため。
        SWIFT_OBJC_BRIDGING_HEADER: Sash/Sash-Bridging-Header.h
        # 署名: 自動署名 + 開発チームを明示。これが無いとアドホック署名(-)になり、
        # アクセシビリティ許可が定着せず毎回プロンプトが出る（AX 系アプリ必須）。
        # project.yml に書くことで `xcodegen generate` してもチーム設定が消えない。
        # ※ Team ID は秘密情報ではない（配布アプリの署名に常に含まれる）。
        #   公開リポジトリでコントリビュータに各自のチームを使わせたい場合は、
        #   Release フェーズで local xcconfig へ外出しする。
        DEVELOPMENT_TEAM: "28T2JHJF87"   # Apple Development: INGYU EUM
        # debug dylib 方式は AX 許可の定着を妨げることがあるため無効化（Xcode 16+）。
        ENABLE_DEBUG_DYLIB: "NO"
        # App Sandbox は付けない（他アプリの AX 操作に必須）。entitlements も付与しない。
    scheme:
      testTargets:
        - SashTests

  SashTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Sash
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.gyugyu86.SashTests
        SWIFT_EMIT_LOC_STRINGS: "NO"
